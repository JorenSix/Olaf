# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle
#https://github.com/JorenSix/Panako/actions/workflows/gradle.yml/badge.svg
name: Build and test Olaf

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS-based actions (mlugg/setup-zig@v2 still ships on Node 20).
  # Default flips on 2026-06-02; this avoids the deprecation warning until upstream updates.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v5
    #setup ffmpeg and zig
    - uses: FedericoCarboni/setup-ffmpeg@v3
      id: setup-ffmpeg
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2
    #run the build and tests
    - run: make
    - run: make install
    - run: make clean
    - run: make mem
    - run: make clean
    - run: make compile_core
    - run: zig build test
