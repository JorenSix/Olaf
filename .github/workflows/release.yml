name: Olaf Zig Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write  # Required for creating releases

jobs:
  # Regular CI builds for pushes and PRs
  ci:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Olaf Zig Build
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'
      - name: Build default target
        run: zig build -Doptimize=ReleaseFast
      - name: Build Windows target
        run: zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseFast

  # Release builds for tags (cli only)
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            os_name: linux-x86_64
          - target: aarch64-linux-gnu
            os_name: linux-aarch64
          - target: x86_64-windows-gnu
            os_name: windows-x86_64
          - target: aarch64-windows-gnu
            os_name: windows-aarch64
          - target: x86_64-macos-none
            os_name: macos-x86_64
          - target: aarch64-macos-none
            os_name: macos-aarch64

    name: Build cli for ${{ matrix.os_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package artifacts
        run: |
          mkdir -p release
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp zig-out/bin/olaf.exe release/
          else
            cp zig-out/bin/olaf release/
          fi
          cp cli/olaf_config.json cli/olaf_config.schema.json release/
          cd release
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            zip -r "olaf_cli-${{ matrix.os_name }}.zip" *
          else
            tar -czf "olaf_cli-${{ matrix.os_name }}.tar.gz" *
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: olaf_cli-${{ matrix.os_name }}
          path: |
            release/olaf_cli-${{ matrix.os_name }}.tar.gz
            release/olaf_cli-${{ matrix.os_name }}.zip
          if-no-files-found: ignore

  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    name: Create GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -o -name "*.zip" | while read file; do
            cp "$file" release-assets/
          done

      - name: Generate release notes
        id: release_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "# Release $TAG_NAME" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" >> release_notes.md
            git log --oneline --no-merges $PREV_TAG..HEAD | head -10 | while read line; do
              echo "- $line" >> release_notes.md
            done
          else
            echo "Initial release of Olaf cli." >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "**Supported Platforms:** Linux (x64/ARM64), macOS (Intel/Apple Silicon), Windows (x64/ARM64)" >> release_notes.md

          {
            echo 'RELEASE_NOTES<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
